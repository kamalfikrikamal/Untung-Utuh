<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Offline – Untung Utuh</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      border: 1px solid #334155;
    }

    h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -.02em; }

    p {
      color: #94a3b8;
      max-width: 30ch;
      line-height: 1.65;
      font-size: .9375rem;
    }

    .retry-btn {
      margin-top: .5rem;
      padding: .75rem 1.75rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: .75rem;
      font-size: .9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .retry-btn:hover { background: #1d4ed8; }

    .status {
      font-size: .8125rem;
      color: #475569;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: .4rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Anda sedang offline</h1>
  <p>Periksa koneksi internet Anda. Halaman akan dimuat ulang secara otomatis saat tersambung kembali.</p>
  <button class="retry-btn" onclick="window.location.reload()">Coba lagi</button>
  <p class="status"><span class="dot"></span>Tidak ada koneksi</p>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
