# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — PRODUCTION
# Hardened, resource-constrained, no source volumes, health checks enforced
# Usage: docker compose -f docker-compose.prod.yml up --build -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  mongo:
    image: mongo:7.0
    container_name: mern_mongo_prod
    restart: always
    volumes:
      - mongo_prod_data:/data/db
      - ./docker/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:?MONGO_ROOT_USER is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_DB:?MONGO_DB is required}
      MONGO_APP_USER: ${MONGO_APP_USER:?MONGO_APP_USER is required}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required}
    expose:
      - "27017"
    networks:
      - mern_prod
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    # Prevent direct host access to Mongo in production — no ports mapping

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mern-backend:prod
    container_name: mern_backend_prod
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "5001"
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_APP_USER}:${MONGO_APP_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=${MONGO_DB}
    networks:
      - mern_prod
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.75"
      restart_policy:
        condition: on-failure
        max_attempts: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
        VITE_APP_NAME: ${VITE_APP_NAME:?VITE_APP_NAME is required}
        VITE_APP_URL: ${VITE_APP_URL:?VITE_APP_URL is required}
    image: mern-frontend:prod
    container_name: mern_frontend_prod
    restart: always
    expose:
      - "80"
    networks:
      - mern_prod
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  nginx:
    image: nginx:1.27-alpine
    container_name: mern_nginx_prod
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      # For SSL: uncomment and mount certificates
      # - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mern_prod
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mongo_prod_data:
    driver: local

networks:
  mern_prod:
    driver: bridge
