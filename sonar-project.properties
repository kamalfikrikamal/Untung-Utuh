sonar.projectKey=untung-utuh
sonar.projectName=Untung Utuh
sonar.projectVersion=1.0

# Server
sonar.host.url=http://localhost:9001

# Sources — scan both backend and frontend
sonar.sources=backend/src,frontend/src
sonar.tests=backend/tests,frontend/tests

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.min.js,\
  **/public/sw.js

sonar.test.exclusions=\
  **/node_modules/**

# Language
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# Coverage exclusions — entry points and config files not testable in isolation
sonar.coverage.exclusions=frontend/src/main.jsx

# Encoding
sonar.sourceEncoding=UTF-8
